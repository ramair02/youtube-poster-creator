services:
  youtube-poster-creator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: youtube-poster-creator
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      - NODE_ENV=production
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - REPLICATE_API_TOKEN=${REPLICATE_API_TOKEN}
    # Volumes defined for persistent cache if required, not strictly necessary for this stateless app
    # volumes:
    #   - /mnt/user/appdata/youtube-poster-creator/.next:/app/.next

    # Use your Unraid reverse proxy network name here (e.g., proxynet, custom_bridge)
